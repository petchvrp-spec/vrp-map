<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VRP Map — แผนผังวิทยาลัย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --navy: #1a2744;
    --navy-mid: #243356;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f5f2eb;
    --cream-mid: #ede9df;
    --white: #ffffff;
    --text-primary: #1a2744;
    --text-secondary: #5a6a8a;
    --text-muted: #8a9ab8;
    --border: rgba(26,39,68,0.1);
    --border-mid: rgba(26,39,68,0.2);
    --shadow: 0 4px 24px rgba(26,39,68,0.12);
    --shadow-up: 0 -4px 24px rgba(26,39,68,0.12);
    --radius: 16px;
    --radius-sm: 10px;
    --header-h: 130px;
    --filter-h: 88px;
    --sheet-peek: 260px;
    --sheet-mid: 55vh;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: 'IBM Plex Sans Thai', 'Sarabun', sans-serif;
    background: var(--cream);
    color: var(--text-primary);
    height: 100%;
    width: 100%;
    overflow: hidden;
    position: fixed;
  }

  /* ─── MAP FULL SCREEN ─── */
  #map-wrap {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  #map { width: 100%; height: 100%; }

  /* ─── TOP HEADER ─── */
  #top-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 500;
    background: var(--navy);
    padding: 14px 16px 12px;
    padding-top: calc(14px + env(safe-area-inset-top, 0px));
    box-shadow: 0 2px 12px rgba(26,39,68,0.25);
  }
  #top-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 2.5px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
  }

  .school-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .logo-circle {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px; color: var(--navy);
    flex-shrink: 0;
  }
  .school-name { color: var(--white); }
  .school-name h1 { font-size: 14px; font-weight: 600; line-height: 1.3; }
  .school-name p { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 1px; }

  .search-wrap { position: relative; }
  .search-wrap svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 15px; height: 15px; opacity: 0.45; pointer-events: none;
  }
  #searchInput {
    width: 100%;
    padding: 9px 12px 9px 36px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    background: rgba(255,255,255,0.1);
    color: var(--white);
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  #searchInput::placeholder { color: rgba(255,255,255,0.4); }
  #searchInput:focus { outline: none; border-color: var(--gold); background: rgba(255,255,255,0.15); }

  /* ─── MAP CONTROLS ─── */
  .map-controls {
    position: fixed;
    right: 14px;
    z-index: 400;
    display: flex; flex-direction: column; gap: 6px;
    transition: bottom 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .map-btn {
    width: 40px; height: 40px;
    background: var(--white); border: 1px solid var(--border-mid);
    border-radius: var(--radius-sm); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; box-shadow: var(--shadow);
    font-family: inherit; color: var(--navy);
    -webkit-appearance: none;
  }
  .map-btn:active { background: var(--cream-mid); }

  /* ─── BOTTOM SHEET ─── */
  #bottom-sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 600;
    background: var(--white);
    border-radius: var(--radius) var(--radius) 0 0;
    box-shadow: var(--shadow-up);
    display: flex;
    flex-direction: column;
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 92vh;
    will-change: transform;
  }

  /* sheet states: peek, mid, full */
  #bottom-sheet.state-peek  { transform: translateY(calc(100% - var(--sheet-peek))); }
  #bottom-sheet.state-mid   { transform: translateY(calc(100% - var(--sheet-mid))); }
  #bottom-sheet.state-full  { transform: translateY(0); }
  #bottom-sheet.state-detail { transform: translateY(calc(100% - var(--sheet-peek))); }

  /* drag handle */
  .drag-handle-wrap {
    padding: 10px 0 4px;
    display: flex; justify-content: center; cursor: grab; flex-shrink: 0;
    touch-action: none;
  }
  .drag-handle {
    width: 36px; height: 4px;
    border-radius: 100px;
    background: var(--border-mid);
  }

  /* ─── FILTERS IN SHEET ─── */
  .sheet-filters {
    padding: 0 16px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .filter-label {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 6px; font-weight: 500;
  }

  .scroll-chips {
    display: flex; gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .scroll-chips::-webkit-scrollbar { display: none; }

  .floor-chip {
    padding: 5px 14px;
    border: 1px solid var(--border-mid);
    border-radius: 100px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    background: transparent; color: var(--text-secondary);
    font-family: inherit; white-space: nowrap; flex-shrink: 0;
    -webkit-appearance: none;
  }
  .floor-chip.active { background: var(--navy); color: var(--white); border-color: var(--navy); }

  .cat-chip {
    padding: 5px 14px;
    border-radius: 100px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    background: var(--cream-mid); color: var(--text-secondary);
    border: 1px solid transparent;
    font-family: inherit; white-space: nowrap; flex-shrink: 0;
    -webkit-appearance: none;
  }
  .cat-chip[data-cat="อาคารเรียน"].active { background: #dbeafe; color: #1d4ed8; border-color: #1d4ed8; }
  .cat-chip[data-cat="กิจกรรม"].active { background: #dcfce7; color: #15803d; border-color: #15803d; }
  .cat-chip[data-cat="บริการ"].active { background: #fef9c3; color: #a16207; border-color: #a16207; }
  .cat-chip[data-cat="ทั้งหมด"].active { background: var(--navy); color: var(--white); }

  /* ─── RESULTS LIST ─── */
  .result-count {
    font-size: 12px; color: var(--text-muted);
    padding: 10px 16px 4px;
    font-weight: 500; flex-shrink: 0;
  }

  #results-list {
    flex: 1; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }
  #results-list::-webkit-scrollbar { display: none; }

  .result-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    active-bg: var(--cream);
  }
  .result-item:active { background: var(--cream); }
  .result-item.active { background: #eef2ff; }

  .result-num {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
    flex-shrink: 0;
    background: var(--navy); color: var(--white);
  }
  .result-num.cat-เรียน { background: #1d4ed8; }
  .result-num.cat-กิจกรรม { background: #15803d; }
  .result-num.cat-บริการ { background: #a16207; }

  .result-info { flex: 1; min-width: 0; }
  .result-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .result-arrow { color: var(--text-muted); font-size: 16px; }

  .empty-state {
    padding: 50px 20px; text-align: center;
    color: var(--text-muted); font-size: 14px; display: none;
  }
  .empty-state svg { width: 40px; height: 40px; opacity: 0.3; margin: 0 auto 10px; display: block; }

  /* safe bottom padding */
  #list-bottom-pad { height: calc(16px + var(--safe-bottom)); flex-shrink: 0; }

  /* ─── DETAIL PANEL (full-height overlay style) ─── */
  #detail-panel {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 700;
    background: var(--white);
    border-radius: var(--radius) var(--radius) 0 0;
    box-shadow: var(--shadow-up);
    border-top: 3px solid var(--gold);
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 70vh;
    display: flex; flex-direction: column;
  }
  #detail-panel.open { transform: translateY(0); }

  .detail-header {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 16px 16px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .detail-icon {
    width: 46px; height: 46px; border-radius: 12px;
    background: var(--navy); color: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 700; flex-shrink: 0;
  }
  .detail-title { flex: 1; }
  .detail-title h2 { font-size: 16px; font-weight: 600; line-height: 1.35; }
  .detail-title .badge {
    display: inline-block; margin-top: 5px;
    font-size: 11px; font-weight: 500; padding: 3px 10px;
    border-radius: 100px; background: var(--cream-mid); color: var(--text-secondary);
  }
  .close-btn {
    background: var(--cream-mid); border: none; cursor: pointer;
    font-size: 16px; color: var(--text-secondary);
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit; flex-shrink: 0;
  }

  .detail-body { padding: 14px 16px; overflow-y: auto; flex: 1; }
  .detail-row {
    display: flex; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row-label { color: var(--text-muted); font-weight: 500; min-width: 72px; }
  .detail-row-val { color: var(--text-primary); flex: 1; }
  .detail-safe { height: calc(8px + var(--safe-bottom)); }

  /* ─── TOAST ─── */
  #toast {
    position: fixed;
    bottom: calc(var(--sheet-peek) + 16px);
    left: 50%; transform: translateX(-50%);
    background: var(--navy); color: var(--white);
    padding: 9px 20px; border-radius: 100px;
    font-size: 13px; z-index: 800;
    opacity: 0; transition: opacity 0.3s, bottom 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ─── LEGEND ─── */
  #legend {
    position: fixed;
    left: 14px; z-index: 400;
    background: var(--white); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 12px;
    box-shadow: var(--shadow); font-size: 11px; line-height: 1.9;
    transition: bottom 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .legend-item { display: flex; align-items: center; gap: 7px; color: var(--text-secondary); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* ─── MARKERS ─── */
  .pin {
    width: 30px; height: 30px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    border: 2px solid rgba(255,255,255,0.9);
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .pin-inner { transform: rotate(45deg); font-size: 11px; font-weight: 700; color: white; }
  .pin.cat-เรียน { background: #1d4ed8; }
  .pin.cat-กิจกรรม { background: #15803d; }
  .pin.cat-บริการ { background: #a16207; }
  .pin.cat-default { background: var(--navy); }
  .pin.active-pin { transform: rotate(-45deg) scale(1.3); box-shadow: 0 4px 16px rgba(0,0,0,0.35); }

  /* Leaflet popup */
  .leaflet-popup-content-wrapper {
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    font-size: 13px;
  }
  .leaflet-popup-content { margin: 10px 14px; font-family: inherit; font-size: 13px; }
  .leaflet-popup-content b { display: block; font-size: 14px; color: var(--navy); margin-bottom: 3px; }
</style>
</head>
<body>

<!-- MAP -->
<div id="map-wrap">
  <div id="map"></div>
</div>

<!-- TOP HEADER -->
<div id="top-header">
  <div class="school-logo">
    <div class="logo-circle">VRP</div>
    <div class="school-name">
      <h1>วิทยาลัยเทคโนโลยีวีรพัฒน์</h1>
      <p>Veeraphat Technological College · แผนผังวิทยาลัย</p>
    </div>
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="ค้นหาห้องเรียน, แผนก, อาคาร..." autocomplete="off" enterkeyhint="search">
  </div>
</div>

<!-- MAP CONTROLS -->
<div class="map-controls" id="mapControls">
  <button class="map-btn" onclick="map.zoomIn()">+</button>
  <button class="map-btn" onclick="map.zoomOut()">−</button>
  <button class="map-btn" onclick="resetView()" style="font-size:13px">⟳</button>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#1d4ed8"></div>อาคารเรียน</div>
  <div class="legend-item"><div class="legend-dot" style="background:#15803d"></div>กิจกรรม</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a16207"></div>บริการ</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1a2744"></div>ทั่วไป</div>
</div>

<!-- BOTTOM SHEET -->
<div id="bottom-sheet" class="state-peek">
  <div class="drag-handle-wrap" id="dragHandle">
    <div class="drag-handle"></div>
  </div>

  <div class="sheet-filters">
    <div class="filter-label">ชั้น</div>
    <div class="scroll-chips" id="floorChips" style="margin-bottom:10px">
      <button class="floor-chip active" data-floor="all">ทุกชั้น</button>
      <button class="floor-chip" data-floor="1">ชั้น 1</button>
      <button class="floor-chip" data-floor="2">ชั้น 2</button>
      <button class="floor-chip" data-floor="3">ชั้น 3</button>
      <button class="floor-chip" data-floor="4">ชั้น 4</button>
    </div>
    <div class="filter-label">หมวดหมู่</div>
    <div class="scroll-chips" id="catChips">
      <button class="cat-chip active" data-cat="ทั้งหมด">ทั้งหมด</button>
      <button class="cat-chip" data-cat="อาคารเรียน">อาคารเรียน</button>
      <button class="cat-chip" data-cat="กิจกรรม">กิจกรรม</button>
      <button class="cat-chip" data-cat="บริการ">บริการ</button>
    </div>
  </div>

  <div class="result-count" id="resultCount"></div>

  <div id="results-list">
    <div id="listItems"></div>
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803 7.5 7.5 0 0015.803 15.803z"/>
      </svg>
      ไม่พบสถานที่ที่ตรงกับการค้นหา
    </div>
    <div id="list-bottom-pad"></div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div id="detail-panel">
  <div class="detail-header">
    <div class="detail-icon" id="d-icon">1</div>
    <div class="detail-title">
      <h2 id="d-name">ชื่อสถานที่</h2>
      <span class="badge" id="d-badge">หมวดหมู่</span>
    </div>
    <button class="close-btn" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body">
    <div class="detail-row"><span class="detail-row-label">ชั้น</span><span class="detail-row-val" id="d-floor">-</span></div>
    <div class="detail-row"><span class="detail-row-label">แผนก</span><span class="detail-row-val" id="d-dept">-</span></div>
    <div class="detail-row"><span class="detail-row-label">รายละเอียด</span><span class="detail-row-val" id="d-desc">-</span></div>
    <div class="detail-safe"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast">กำลังเดินทาง...</div>

<script>
/* ─── MAP ─── */
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 3,
  zoomSnap: 0.25,
  zoomControl: false
});
const IMAGE_W = 1920, IMAGE_H = 1080;
const bounds = [[0,0],[IMAGE_H,IMAGE_W]];
L.imageOverlay('5.png', bounds).addTo(map);
map.fitBounds(bounds);

/* ─── DATA ─── */
const SHEET_ID = '1bvS98j_aLvd9-cT6x3oBozYEFTVA92XQoEdl0_BzF7U';

let allLocations = [
  { id:1,  name:"ป้อมยามทางเข้า",     category:"บริการ",    floor:1, dept:"งานรักษาความปลอดภัย", desc:"ตรวจบัตร แลกบัตรผ่าน", x:1503, y:742 },
  { id:2,  name:"อาคารธุรการ 1",       category:"บริการ",    floor:3, dept:"สำนักงาน",             desc:"ห้องผู้อำนวยการ ห้องการเงิน", x:1152, y:813 },
  { id:3,  name:"อาคารเรียนรวม 2",     category:"อาคารเรียน",floor:4, dept:"อาคารเรียนรวม",        desc:"ห้องเรียนทฤษฎี", x:650, y:750 },
  { id:4,  name:"บ้านพักผู้บริหาร",    category:"บริการ",    floor:1, dept:"บ้านพักผู้บริหาร",     desc:"พื้นที่ส่วนบุคคล", x:400, y:600 },
  { id:5,  name:"โรงฝึกงานช่างยนต์",  category:"อาคารเรียน",floor:1, dept:"แผนกช่างยนต์",        desc:"ซ่อมบำรุง เครื่องยนต์ อุปกรณ์", x:750, y:400 },
  { id:6,  name:"ห้องน้ำ",             category:"บริการ",    floor:1, dept:"ห้องน้ำ",              desc:"ห้องน้ำ", x:550, y:350 },
  { id:7,  name:"สนามฟุตบอล",          category:"กิจกรรม",   floor:1, dept:"งานกิจกรรม",          desc:"สนามหญ้าสำหรับกีฬาและกิจกรรมกลางแจ้ง", x:1600, y:500 },
  { id:8,  name:"หอประชุมใหญ่",        category:"กิจกรรม",   floor:2, dept:"งานกิจกรรม",          desc:"จุ 1,200 คน ใช้จัดพิธีและกิจกรรม", x:1200, y:720 },
  { id:9,  name:"โรงอาหาร",            category:"บริการ",    floor:1, dept:"งานบริการ",            desc:"ร้านอาหาร ร้านเครื่องดื่ม เปิด 07.00-17.00", x:850, y:900 },
  { id:10, name:"ห้องสมุด",            category:"บริการ",    floor:2, dept:"งานวิทยบริการ",        desc:"ยืม-คืนหนังสือ Internet เปิด 08.00-16.30", x:1050, y:600 },
  { id:11, name:"ห้องพยาบาล",          category:"บริการ",    floor:1, dept:"งานสวัสดิการ",         desc:"ปฐมพยาบาล บริการสุขภาพ", x:1300, y:850 },
  { id:12, name:"ลานอเนกประสงค์",      category:"กิจกรรม",   floor:1, dept:"งานกิจกรรม",          desc:"จัดกิจกรรม ตลาดนัด นิทรรศการ", x:1400, y:700 },
  { id:13, name:"แผนกคอมพิวเตอร์",    category:"อาคารเรียน",floor:3, dept:"แผนกคอมพิวเตอร์",     desc:"ห้อง Lab คอมพิวเตอร์ 200+ เครื่อง", x:300, y:780 },
  { id:14, name:"แผนกอิเล็กทรอนิกส์", category:"อาคารเรียน",floor:2, dept:"แผนกอิเล็กทรอนิกส์", desc:"วงจรไฟฟ้า อิเล็กทรอนิกส์ โทรคมนาคม", x:450, y:450 },
  { id:15, name:"ที่จอดรถนักศึกษา",   category:"บริการ",    floor:1, dept:"-",                   desc:"จอดรถจักรยานยนต์ และรถยนต์นักศึกษา", x:1700, y:900 },
];

let filtered = [...allLocations];
let markers = {};
let activeMarkerId = null;
let activeFloor = 'all';
let activeCat = 'ทั้งหมด';

/* ─── SHEET FETCH ─── */
async function fetchFromSheet() {
  if (!SHEET_ID || SHEET_ID === 'YOUR_SHEET_ID') { renderAll(); return; }
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0,-2));
    allLocations = json.table.rows.filter(r=>r.c[0]?.v).map(r=>({
      id:r.c[0]?.v||0, name:r.c[1]?.v||'', category:r.c[2]?.v||'ทั่วไป',
      floor:r.c[3]?.v||1, dept:r.c[4]?.v||'-', desc:r.c[5]?.v||'-',
      x:r.c[6]?.v||960, y:r.c[7]?.v||540,
    }));
    filtered = [...allLocations];
  } catch(e) { console.warn('Sheet fetch failed:', e); }
  renderAll();
}

/* ─── MARKERS ─── */
function catClass(cat) {
  if (cat==='อาคารเรียน') return 'cat-เรียน';
  if (cat==='กิจกรรม') return 'cat-กิจกรรม';
  if (cat==='บริการ') return 'cat-บริการ';
  return 'cat-default';
}
function makeIcon(loc, active=false) {
  const cc = catClass(loc.category);
  return L.divIcon({
    className:'',
    html:`<div class="pin ${cc}${active?' active-pin':''}"><span class="pin-inner">${loc.id}</span></div>`,
    iconSize:[30,30], iconAnchor:[15,30], popupAnchor:[0,-32]
  });
}
function renderMarkers() {
  Object.values(markers).forEach(m=>map.removeLayer(m));
  markers={};
  filtered.forEach(loc=>{
    const m = L.marker([loc.y,loc.x],{icon:makeIcon(loc)}).addTo(map)
      .bindPopup(`<b>${loc.name}</b>${loc.category} · ชั้น ${loc.floor}`,{maxWidth:180});
    m.on('click',()=>selectLocation(loc.id));
    markers[loc.id]=m;
  });
}

/* ─── LIST ─── */
function renderList() {
  const container=document.getElementById('listItems');
  const empty=document.getElementById('emptyState');
  const count=document.getElementById('resultCount');
  container.innerHTML='';
  if(filtered.length===0){ empty.style.display='block'; count.textContent=''; return; }
  empty.style.display='none';
  count.textContent=`พบ ${filtered.length} สถานที่`;
  filtered.forEach(loc=>{
    const div=document.createElement('div');
    div.className='result-item'+(loc.id===activeMarkerId?' active':'');
    div.dataset.id=loc.id;
    const cc=catClass(loc.category);
    div.innerHTML=`
      <div class="result-num ${cc}">${loc.id}</div>
      <div class="result-info">
        <div class="result-name">${loc.name}</div>
        <div class="result-meta">${loc.category} · ชั้น ${loc.floor}${loc.dept&&loc.dept!=='-'?' · '+loc.dept:''}</div>
      </div>
      <span class="result-arrow">›</span>`;
    div.addEventListener('click',()=>selectLocation(loc.id));
    container.appendChild(div);
  });
}

function renderAll() { applyFilters(); renderMarkers(); renderList(); }

/* ─── SELECT ─── */
function selectLocation(id) {
  const loc=allLocations.find(l=>l.id===id); if(!loc) return;
  if(activeMarkerId&&markers[activeMarkerId]){
    const prev=allLocations.find(l=>l.id===activeMarkerId);
    if(prev) markers[activeMarkerId].setIcon(makeIcon(prev,false));
  }
  activeMarkerId=id;
  if(markers[id]) markers[id].setIcon(makeIcon(loc,true));
  map.flyTo([loc.y,loc.x],1.5,{duration:1.0});
  showToast('ไปยัง '+loc.name);

  document.getElementById('d-icon').textContent=loc.id;
  document.getElementById('d-name').textContent=loc.name;
  document.getElementById('d-badge').textContent=loc.category;
  document.getElementById('d-floor').textContent='ชั้น '+loc.floor;
  document.getElementById('d-dept').textContent=loc.dept||'-';
  document.getElementById('d-desc').textContent=loc.desc||'-';
  document.getElementById('detail-panel').classList.add('open');

  /* collapse sheet to peek when detail opens */
  setSheetState('peek');

  document.querySelectorAll('.result-item').forEach(el=>{
    el.classList.toggle('active',parseInt(el.dataset.id)===id);
  });
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  if(activeMarkerId&&markers[activeMarkerId]){
    const prev=allLocations.find(l=>l.id===activeMarkerId);
    if(prev) markers[activeMarkerId].setIcon(makeIcon(prev,false));
  }
  activeMarkerId=null;
  document.querySelectorAll('.result-item').forEach(el=>el.classList.remove('active'));
}

/* ─── FILTERS ─── */
function applyFilters() {
  const kw=document.getElementById('searchInput').value.toLowerCase();
  filtered=allLocations.filter(loc=>{
    const matchFloor=activeFloor==='all'||String(loc.floor)===String(activeFloor);
    const matchCat=activeCat==='ทั้งหมด'||loc.category===activeCat;
    const matchKw=!kw||loc.name.toLowerCase().includes(kw)||(loc.desc||'').toLowerCase().includes(kw)||(loc.dept||'').toLowerCase().includes(kw);
    return matchFloor&&matchCat&&matchKw;
  });
}

document.getElementById('searchInput').addEventListener('input',()=>{
  setSheetState('mid');
  renderAll();
});
document.getElementById('searchInput').addEventListener('focus',()=>setSheetState('mid'));

document.getElementById('floorChips').addEventListener('click',e=>{
  const btn=e.target.closest('.floor-chip'); if(!btn) return;
  document.querySelectorAll('.floor-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeFloor=btn.dataset.floor; renderAll();
});
document.getElementById('catChips').addEventListener('click',e=>{
  const btn=e.target.closest('.cat-chip'); if(!btn) return;
  document.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); activeCat=btn.dataset.cat; renderAll();
});

/* ─── BOTTOM SHEET DRAG ─── */
const sheet=document.getElementById('bottom-sheet');
const states=['peek','mid','full'];
let sheetState='peek';

function setSheetState(s) {
  sheetState=s;
  sheet.className='state-'+s;
  updateOverlayPositions();
}

function updateOverlayPositions() {
  const sheetH = sheetState==='peek'
    ? parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sheet-peek'))
    : sheetState==='mid'
      ? window.innerHeight*0.55
      : window.innerHeight*0.92;

  const pad = sheetH + 16;
  document.getElementById('mapControls').style.bottom = pad+'px';
  document.getElementById('legend').style.bottom = pad+'px';
  document.getElementById('toast').style.bottom = (sheetH+16)+'px';
}

/* drag logic */
let dragStart=null, dragStartY=null, sheetStartY=null;
const handle=document.getElementById('dragHandle');

handle.addEventListener('touchstart',e=>{
  dragStart=e.touches[0].clientY;
  sheetStartY=sheet.getBoundingClientRect().top;
  sheet.style.transition='none';
},{passive:true});

handle.addEventListener('touchmove',e=>{
  if(dragStart===null) return;
  const dy=e.touches[0].clientY-dragStart;
  const newTop=sheetStartY+dy;
  const minTop=window.innerHeight*0.08;
  const maxTop=window.innerHeight-parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--sheet-peek'));
  const clampedTop=Math.max(minTop,Math.min(maxTop,newTop));
  sheet.style.transform=`translateY(${clampedTop}px)`;
},{passive:true});

handle.addEventListener('touchend',e=>{
  sheet.style.transition='';
  if(dragStart===null){ dragStart=null; return; }
  const dy=e.changedTouches[0].clientY-dragStart;
  if(dy < -60) {
    setSheetState(sheetState==='peek'?'mid':'full');
  } else if(dy > 60) {
    setSheetState(sheetState==='full'?'mid':'peek');
  } else {
    setSheetState(sheetState);
  }
  dragStart=null;
},{passive:true});

/* tap on sheet body to expand */
sheet.addEventListener('click',e=>{
  if(sheetState==='peek'&&!e.target.closest('.result-item')&&!e.target.closest('button')&&!e.target.closest('input')) {
    setSheetState('mid');
  }
});

/* ─── UTILS ─── */
let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}
function resetView() {
  map.flyToBounds(bounds,{duration:0.8});
  closeDetail();
}

/* ─── INIT ─── */
updateOverlayPositions();
fetchFromSheet();
</script>
